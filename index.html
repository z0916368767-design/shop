<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沒毛病｜寵物溝通 花草能量療癒商品</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FDFCF9; --white: #FFFFFF; --sage: #8DAA91; --sage-dark: #6B846F; --text: #4A4A4A; --radius: 18px; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; margin: 0; padding-bottom: 80px; }
        header { text-align: center; padding: 15px; background: white; border-bottom: 1px solid #EEE; position: sticky; top: 0; z-index: 1100; }
        header h1 { font-size: 1.1rem; color: var(--sage-dark); margin: 0; }
        .container { max-width: 800px; width: 100%; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .card { background: white; border-radius: var(--radius); padding: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 15px; }
        .btn-main { background: var(--sage); color: white; border: none; padding: 12px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-outline { background: none; border: 1px solid #CCC; color: #666; padding: 8px; border-radius: 50px; width: 100%; cursor: pointer; margin-top: 5px; }
        input, textarea, select { width: 100%; border: 1px solid #EEE; border-radius: 10px; padding: 12px; margin: 8px 0; box-sizing: border-box; background: #FAFAFA; font-size: 14px; }
        #cart-floater { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 50px; z-index: 2000; cursor: pointer; display: none; }
        #alert-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 25px; border-radius: 50px; display: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="alert-box">🛎️ 系統通知</div>

<header><h1>沒毛病｜寵物溝通 花草能量療癒商品</h1></header>

<div id="cart-floater" onclick="switchView('cartDetail')">🛒 購物車 (<span id="cart-count">0</span>)</div>

<div class="container">
    <section id="viewShop" class="view-section active">
        <div id="catScroll" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:10px;"></div>
        <div id="shopDisplay" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </section>

    <section id="viewCartDetail" class="view-section">
        <div class="card">
            <h3>🛒 購物車明細</h3>
            <div id="fullCartList"></div>
            <div style="text-align:right; margin-top:15px; font-weight:bold;">總計：<span id="cartSubtotal" style="color:#C67E7E;">$0</span></div>
            <button class="btn-main" onclick="switchView('checkout')">前往結帳</button>
            <button class="btn-outline" onclick="switchView('shop')">返回商店</button>
        </div>
    </section>

    <section id="viewCheckout" class="view-section">
        <div class="card">
            <h3>📋 填寫配送資訊</h3>
            <input type="text" id="custName" placeholder="收件姓名">
            <input type="tel" id="custPhone" placeholder="收件電話">
            <select id="logistic"><option value="7-11 店到店">7-11 店到店 ($60)</option><option value="全家 店到店">全家 店到店 ($60)</option><option value="宅配到府">宅配到府 ($100)</option></select>
            <input type="text" id="areaLoc" placeholder="縣市區域">
            <input type="text" id="storeName" placeholder="門市或詳細地址">
            <button class="btn-main" onclick="processToPayment()">確認資訊</button>
        </div>
    </section>

    <section id="viewPayment" class="view-section">
        <div class="card" style="border-top:5px solid var(--sage);">
            <h3>💰 請完成匯款，訂單才算成立呦~</h3>
            <div style="background:#F4F4F4; padding:15px; border-radius:10px; line-height:2;">
                銀行：國泰世華 (013)<br>
                帳號：<span>036506234641</span><br>
                應付總額：<b id="finalTotal" style="color:red; font-size:1.2rem;">$0</b>
            </div>
            <div style="margin-top:20px;">
                <label>1. 匯款後五碼：</label><input type="text" id="payNote">
                <label>2. 上傳匯款截圖：</label><input type="file" id="payImg" accept="image/*">
                <button class="btn-main" onclick="submitFinalOrder()">提交回報</button>
            </div>
        </div>
    </section>
</div>

<script>
    // 這裡只需要商店與下單的邏輯，移除所有 Admin 的程式碼
    let db = {
        categories: ['全部商品', '最熱銷🔥', '新品上架🆕'],
        products: [{ name: '花草能量噴霧', price: 580, cat: '最熱銷🔥' }, { name: '寵物溝通預約', price: 1200, cat: '新品上架🆕' }],
        cart: []
    };

    function switchView(view) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
        window.scrollTo(0, 0);
    }

    function addToCart(idx) {
        db.cart.push(db.products[idx]);
        document.getElementById('cart-floater').style.display = 'block';
        document.getElementById('cart-count').innerText = db.cart.length;
        const b = document.getElementById('alert-box'); b.innerText = "已加入購物車"; b.style.display = 'block'; setTimeout(()=>b.style.display='none', 2000);
    }

    function renderCartDetail() {
        const list = document.getElementById('fullCartList');
        let html = ""; let subtotal = 0;
        db.cart.forEach((item, i) => {
            html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #EEE;"><span>${item.name}</span><span>$${item.price}</span></div>`;
            subtotal += item.price;
        });
        list.innerHTML = html;
        document.getElementById('cartSubtotal').innerText = `$${subtotal}`;
    }

    function processToPayment() {
        const fee = document.getElementById('logistic').value.includes('宅配') ? 100 : 60;
        document.getElementById('finalTotal').innerText = `$${db.cart.reduce((s, i) => s + i.price, 0) + fee}`;
        switchView('payment');
    }

    function submitFinalOrder() {
        alert("訂單已提交回報，我們會盡快處理！");
        location.reload(); // 簡單重整回首頁
    }

    function renderShop(filter) {
        document.getElementById('catScroll').innerHTML = db.categories.map(c => `<button onclick="renderShop('${c}')" style="margin-right:5px; padding:5px 12px; border-radius:50px; border:1px solid var(--sage); background:${filter===c?'var(--sage)':'none'}; color:${filter===c?'#fff':'var(--sage)'}">${c}</button>`).join('');
        const list = filter === '全部商品' ? db.products : db.products.filter(p => p.cat === filter);
        document.getElementById('shopDisplay').innerHTML = list.map((p) => `<div class="card" style="text-align:center;"><div style="height:80px; background:#f9f9f9; border-radius:10px;"></div><div style="font-weight:bold; margin-top:5px;">${p.name}</div><div>$${p.price}</div><button class="btn-main" onclick="addToCart(${db.products.indexOf(p)})">加入購物車</button></div>`).join('');
    }

    renderShop('全部商品');
</script>
</body>
</html>
